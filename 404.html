<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found | Brandshed</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        .nf-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; text-align: center; background: var(--cream, #FAF7F2); }
        .nf-inner { max-width: 560px; }
        .nf-num { font-family: 'Fraunces', serif; font-size: clamp(5rem, 15vw, 8rem); line-height: 1; margin: 0 0 1rem; color: var(--rust, #B45838); }
        .nf-title { font-family: 'Fraunces', serif; font-size: clamp(1.75rem, 4vw, 2.5rem); margin: 0 0 1rem; color: var(--ink, #2A2622); }
        .nf-text { font-family: 'Outfit', sans-serif; font-size: 1.05rem; line-height: 1.6; color: var(--ink, #2A2622); opacity: 0.85; margin: 0 0 2rem; }
        .nf-btn { display: inline-block; padding: 0.9rem 1.75rem; background: var(--rust, #B45838); color: #fff; text-decoration: none; border-radius: 999px; font-family: 'Outfit', sans-serif; font-weight: 600; transition: transform 0.2s, background 0.2s; }
        .nf-btn:hover { transform: translateY(-2px); background: var(--ink, #2A2622); }
    </style>
</head>
<body>
    <div class="nf-wrap">
        <div class="nf-inner">
            <p class="nf-num">404</p>
            <h1 class="nf-title">Hmm, that page wandered off.</h1>
            <p class="nf-text">The page you're looking for doesn't exist, or might have been moved while we were tidying the workshop. Let's get you back to the homepage.</p>
            <a href="/" class="nf-btn">← Back to brandshed.co.za</a>
        </div>
    </div>
</body>
</html>
